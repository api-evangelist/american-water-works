aid: american-water-works
url: https://raw.githubusercontent.com/api-evangelist/american-water-works/refs/heads/main/apis.yml
name: American Water Works
description: >-
  American Water Works Company is the largest publicly traded U.S. water and wastewater
  utility company, providing drinking water, wastewater, and other related services to
  approximately 14 million people in more than 1,700 communities across 14 states. The
  company operates through regulated utility subsidiaries and offers customer self-service
  through its MyWater online portal and mobile app.
tags:
  - Water Utility
  - Wastewater
  - Public Utility
  - Infrastructure
  - Environmental Services
  - Water Management
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
apis: []
common:
  - type: Website
    url: https://www.amwater.com
  - type: Portal
    url: https://www.amwater.com/mywater
    name: MyWater Customer Portal
  - type: Features
    data:
      - name: Drinking Water Service
        description: >-
          Safe, reliable drinking water service to approximately 14 million people in
          1,700+ communities across California, Georgia, Hawaii, Illinois, Indiana, Iowa,
          Kentucky, Maryland, Missouri, New Jersey, Pennsylvania, Tennessee, Virginia, and West Virginia.
      - name: Wastewater Treatment
        description: >-
          Wastewater collection, treatment, and disposal services for municipalities and
          communities under long-term service contracts and regulated utility operations.
      - name: MyWater Customer Portal
        description: >-
          Online customer self-service portal for bill payment, account management, usage
          monitoring, service start/stop, and alert enrollment.
      - name: Water Infrastructure Management
        description: >-
          Operation and maintenance of water treatment plants, distribution systems, storage
          tanks, and pumping stations across 14 states.
      - name: Community Water Solutions
        description: >-
          Partnering with municipalities and communities to take over operation of their
          water and wastewater systems, providing expertise and capital investment.
      - name: Military Base Water Services
        description: >-
          Operating water and wastewater systems on U.S. military installations through
          50-year privatization contracts.
  - type: UseCases
    data:
      - name: Residential Water Service
        description: >-
          Providing reliable, safe, and affordable drinking water and wastewater service
          to homes and apartments across American Water's service territory.
      - name: Municipal System Acquisition
        description: >-
          Acquiring or taking over operations of financially stressed or aging municipal
          water systems to provide professional management and capital investment.
      - name: Military Installation Water Privatization
        description: >-
          Managing drinking water and wastewater systems on military bases under
          long-term privatization agreements with the U.S. Department of Defense.
      - name: Industrial Water Supply
        description: >-
          Providing industrial-grade water supply and wastewater treatment services to
          manufacturing, food processing, and commercial facilities.
  - type: Integrations
    data:
      - name: Green Button Water Data
        description: >-
          Participation in open data initiatives enabling customers to download and share
          their water usage data with authorized third-party conservation and analytics applications.
      - name: Smart Meter Infrastructure
        description: >-
          Advanced metering infrastructure (AMI) enabling real-time water usage monitoring,
          leak detection alerts, and data-driven conservation programs for customers.
